@if (playbackManager.currentSong()) {
  <div
    class="fixed bottom-0 left-0 right-0 bg-gray-900/95 backdrop-blur-md border-t border-gray-800 p-4 z-50"
  >
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-4">
      <div class="flex flex-col items-start gap-1 w-full md:w-1/4">
        <h4 class="text-white font-semibold truncate md:max-w-50">
          {{ playbackManager.currentSong()?.title }}
        </h4>
        <p class="text-gray-400 text-xs truncate md:max-w-36">
          {{ playbackManager.currentSong()?.artist || 'Artista desconocido' }}
        </p>
      </div>

      <div class="flex flex-col items-center gap-2 flex-1 w-full">
        <div class="flex items-center gap-6">
          <button
            (click)="playbackManager.previous()"
            class="text-white hover:text-indigo-400 transition-colors cursor-pointer"
          >
            <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
            </svg>
          </button>

          <button
            (click)="playbackManager.togglePlay()"
            class="bg-white hover:scale-105 text-black p-3 rounded-full transition-all shadow-lg cursor-pointer"
          >
            @if (playbackManager.isPlaying()) {
              <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
              </svg>
            } @else {
              <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
            }
          </button>

          <button
            (click)="playbackManager.next()"
            class="text-white hover:text-indigo-400 transition-colors cursor-pointer"
          >
            <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
              <path d="M6 18l8.5-6L6 6zm9-12v12h2V6z" />
            </svg>
          </button>
        </div>

        <div class="flex items-center gap-3 w-full max-w-md text-xs font-mono text-gray-500">
          <span
            (mouseenter)="isTimeHovered.set(true)"
            (mouseleave)="isTimeHovered.set(false)"
            (click)="playbackManager.reset()"
            class="cursor-pointer min-w-11 text-end hover:text-white"
          >
            @if (isTimeHovered()) {
              reset
            } @else {
              {{ playbackManager.currentTime() | duration }}
            }
          </span>
          <input
            type="range"
            class="player-range flex-1 h-1.5 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-indigo-500"
            [max]="playbackManager.duration()"
            [value]="playbackManager.currentTime()"
            (input)="onSeek($event)"
          />
          <span>{{ playbackManager.duration() | duration }}</span>
        </div>
      </div>

      <div class="w-1/4 flex justify-end gap-10">
        <button
          (click)="playbackManager.shuffleAndPlay()"
          [disabled]="songManager.loading()"
          class="text-gray-400 hover:text-indigo-400 transition-colors disabled:opacity-30 cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="fill-current"
            width="24"
            height="24"
            viewBox="0 0 16 16"
          >
            <path
              fill-rule="evenodd"
              d="M1.75 12.5a.75.75 0 0 1 0-1.5h2.044c.86 0 1.644-.49 2.021-1.262L6.665 8l-.85-1.738A2.25 2.25 0 0 0 3.794 5H1.75a.75.75 0 1 1 0-1.5h2.044a3.75 3.75 0 0 1 3.369 2.103l.337.69l.337-.69A3.75 3.75 0 0 1 11.206 3.5h1.233l-.97-.97a.75.75 0 0 1 1.061-1.06l2.25 2.25a.75.75 0 0 1 0 1.06l-2.25 2.25a.75.75 0 1 1-1.06-1.06l.97-.97h-1.234c-.86 0-1.644.49-2.021 1.262l-2.022 4.135A3.75 3.75 0 0 1 3.794 12.5zm6.639-1.542l.696-1.424l.1.204A2.25 2.25 0 0 0 11.206 11h1.233l-.97-.97a.75.75 0 1 1 1.061-1.06l2.25 2.25a.75.75 0 0 1 0 1.06l-2.25 2.25a.75.75 0 1 1-1.06-1.06l.97-.97h-1.234a3.75 3.75 0 0 1-2.905-1.378q.046-.08.088-.164"
              clip-rule="evenodd"
            />
          </svg>
        </button>

        <div class="hidden md:w-auto md:flex items-center justify-end gap-6">
          <app-volume-visualizer />
        </div>
      </div>
    </div>
  </div>
}
